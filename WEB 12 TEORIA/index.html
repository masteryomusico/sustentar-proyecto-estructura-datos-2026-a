<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manual Web · Estructuras de Datos</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── INDEX-SPECIFIC STYLES ── */
    .hero {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px 20px;
      overflow: hidden;
    }
    .hero-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; animation: drift 12s ease-in-out infinite; }
    .hero-orb.a { width:500px;height:500px;background:var(--glow);top:-100px;left:-100px;animation-delay:0s }
    .hero-orb.b { width:400px;height:400px;background:var(--glow3);bottom:-80px;right:-80px;animation-delay:-4s }
    .hero-orb.c { width:300px;height:300px;background:var(--glow2);top:40%;left:60%;animation-delay:-8s }

    .hero-label {
      font-family:'Space Mono',monospace; font-size:11px;
      letter-spacing:4px; text-transform:uppercase; color:var(--accent);
      margin-bottom:20px; opacity:0; animation:fadeUp 0.8s 0.2s forwards;
    }
    .hero h1 {
      font-size:clamp(2.5rem,7vw,5.5rem); font-weight:800;
      line-height:1.05; letter-spacing:-0.03em; margin-bottom:24px;
      opacity:0; animation:fadeUp 0.8s 0.4s forwards;
    }
    .hero h1 span {
      background:linear-gradient(135deg,var(--accent),var(--glow3));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .hero > p {
      font-size:1.1rem; color:var(--muted); max-width:480px;
      line-height:1.7; margin-bottom:48px;
      opacity:0; animation:fadeUp 0.8s 0.6s forwards;
    }
    .hero-stats {
      display:flex; gap:40px;
      opacity:0; animation:fadeUp 0.8s 0.8s forwards; margin-bottom:52px;
    }
    .stat { text-align:center; }
    .stat-num { display:block; font-size:2rem; font-weight:800; color:var(--accent); font-family:'Space Mono',monospace; }
    .stat-label { font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }

    .scroll-indicator {
      position:absolute; bottom:32px; left:50%; transform:translateX(-50%);
      display:flex; flex-direction:column; align-items:center; gap:8px;
      opacity:0; animation:fadeUp 0.8s 1.2s forwards;
    }
    .scroll-line {
      width:1px; height:48px;
      background:linear-gradient(to bottom,var(--accent),transparent);
      animation:scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse { 0%,100%{opacity:.3;transform:scaleY(1)} 50%{opacity:1;transform:scaleY(1.2)} }

    /* ── TOPICS GRID ── */
    .topics {
      position:relative; z-index:1;
      padding:80px 40px; max-width:1300px; margin:0 auto;
    }
    .section-header {
      display:flex; align-items:baseline; gap:16px; margin-bottom:48px;
    }
    .section-title { font-size:2rem; font-weight:800; letter-spacing:-0.02em; }
    .section-line { flex:1; height:1px; background:var(--border); }
    .section-num { font-family:'Space Mono',monospace; font-size:0.75rem; color:var(--muted); letter-spacing:2px; }

    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }

    .card {
      position:relative; background:var(--panel); border:1px solid var(--border);
      border-radius:16px; padding:28px 28px 24px;
      text-decoration:none; color:inherit; display:block; overflow:hidden;
      transition:transform .3s cubic-bezier(.34,1.56,.64,1),border-color .3s,box-shadow .3s;
      opacity:0; transform:translateY(20px);
    }
    .card.visible { animation:cardIn .5s forwards; }
    .card::before { content:''; position:absolute; inset:0; opacity:0; transition:opacity .3s; border-radius:inherit; }
    .card:hover::before { opacity:1; }
    .card:hover { transform:translateY(-6px); border-color:rgba(56,189,248,.3); box-shadow:0 20px 60px rgba(56,189,248,.08),0 0 0 1px rgba(56,189,248,.1); }

    .card[data-color="blue"]::before   { background:radial-gradient(circle at top left,rgba(59,130,246,.07),transparent 60%) }
    .card[data-color="cyan"]::before   { background:radial-gradient(circle at top left,rgba(6,182,212,.07),transparent 60%) }
    .card[data-color="purple"]::before { background:radial-gradient(circle at top left,rgba(139,92,246,.07),transparent 60%) }
    .card[data-color="emerald"]::before{ background:radial-gradient(circle at top left,rgba(16,185,129,.07),transparent 60%) }
    .card[data-color="orange"]::before { background:radial-gradient(circle at top left,rgba(249,115,22,.07),transparent 60%) }
    .card[data-color="rose"]::before   { background:radial-gradient(circle at top left,rgba(244,63,94,.07),transparent 60%) }

    .card-num { font-family:'Space Mono',monospace; font-size:.65rem; letter-spacing:3px; color:var(--muted); margin-bottom:12px; }
    .card-icon { font-size:2rem; margin-bottom:14px; display:block; }
    .card h3 { font-size:1.1rem; font-weight:700; letter-spacing:-.01em; margin-bottom:8px; }
    .card p { font-size:.82rem; color:var(--muted); line-height:1.6; margin-bottom:20px; }
    .card-tags { display:flex; flex-wrap:wrap; gap:6px; }
    .tag {
      font-family:'Space Mono',monospace; font-size:.6rem; letter-spacing:1px;
      text-transform:uppercase; padding:3px 8px; border-radius:4px;
      background:rgba(56,189,248,.08); border:1px solid rgba(56,189,248,.15); color:var(--accent);
    }
    .card-arrow {
      position:absolute; top:24px; right:24px; width:28px; height:28px;
      display:flex; align-items:center; justify-content:center;
      border:1px solid var(--border); border-radius:50%; font-size:.8rem;
      transition:transform .3s,border-color .3s,background .3s;
    }
    .card:hover .card-arrow { transform:rotate(45deg); border-color:rgba(56,189,248,.4); background:rgba(56,189,248,.1); }

    footer {
      position:relative; z-index:1; text-align:center;
      padding:60px 20px; border-top:1px solid var(--border);
      color:var(--muted); font-size:.8rem;
      font-family:'Space Mono',monospace; letter-spacing:1px;
    }

    @media(max-width:600px){
      .topics { padding:60px 20px; }
      .hero-stats { gap:24px; }
      .stat-num { font-size:1.5rem; }
    }
  </style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- HERO -->
<header class="hero">
  <div class="hero-orb a"></div>
  <div class="hero-orb b"></div>
  <div class="hero-orb c"></div>

  <p class="hero-label">Proyecto Académico · 2026</p>
  <h1>Estructuras<br>de <span>Datos</span></h1>
  <p>Un manual interactivo que cubre los fundamentos y estructuras esenciales de la informática moderna.</p>
  <div class="hero-stats">
    <div class="stat"><span class="stat-num">12</span><span class="stat-label">Temas</span></div>
    <div class="stat"><span class="stat-num">24</span><span class="stat-label">Ejemplos</span></div>
    <div class="stat"><span class="stat-num">24</span><span class="stat-label">Retos</span></div>
  </div>
  <div class="scroll-indicator"><div class="scroll-line"></div></div>
</header>

<!-- TOPICS -->
<main class="topics">
  <div class="section-header">
    <h2 class="section-title">Contenidos</h2>
    <div class="section-line"></div>
    <span class="section-num">12 MÓDULOS</span>
  </div>
  <div class="grid" id="grid"></div>
</main>

<footer>Manual Web · Estructuras de Datos — Proyecto Académico 2026</footer>

<script>
  // Custom cursor
  const cur = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{ mx=e.clientX;my=e.clientY; cur.style.left=mx+'px';cur.style.top=my+'px'; });
  (function animRing(){ rx+=(mx-rx)*.12;ry+=(my-ry)*.12; ring.style.left=rx+'px';ring.style.top=ry+'px'; requestAnimationFrame(animRing); })();

  const topics = [
    { id:'01', color:'blue',    icon:'🧠', title:'Introducción',            tags:['Fundamentos','Teoría'],           desc:'Conceptos base sobre estructuras de datos, su importancia y clasificación.', href:'temas/01-introduccion.html' },
    { id:'02', color:'cyan',    icon:'📦', title:'Arrays',                   tags:['Índices','Memoria'],              desc:'Colecciones de datos almacenados en posiciones contiguas de memoria.',         href:'temas/02-arrays.html' },
    { id:'03', color:'purple',  icon:'🔗', title:'Listas Simples',           tags:['Nodos','Punteros'],               desc:'Estructura dinámica donde cada nodo apunta al siguiente.',                     href:'temas/03-listas-simples.html' },
    { id:'04', color:'emerald', icon:'🔄', title:'Listas Dobles y Circulares',tags:['Doble enlace','Circular'],      desc:'Listas con punteros bidireccionales o con el último nodo apuntando al primero.',href:'temas/04-listas-dobles-circulares.html' },
    { id:'05', color:'orange',  icon:'📚', title:'Pilas (Stack)',             tags:['LIFO','push / pop'],             desc:'Estructura LIFO: el último elemento en entrar es el primero en salir.',         href:'temas/05-pilas.html' },
    { id:'06', color:'rose',    icon:'🚶', title:'Colas (Queue)',             tags:['FIFO','deque'],                  desc:'Estructura FIFO: el primer elemento en entrar es el primero en salir.',         href:'temas/06-colas.html' },
    { id:'07', color:'blue',    icon:'#️⃣', title:'Tablas Hash',             tags:['Clave-Valor','Hashing'],          desc:'Estructura que mapea claves a valores mediante una función hash para acceso O(1).',href:'temas/07-tablas-hash.html' },
    { id:'08', color:'cyan',    icon:'🌳', title:'Árboles Binarios',         tags:['Raíz','Hijos'],                  desc:'Estructura jerárquica donde cada nodo tiene a lo sumo dos hijos.',              href:'temas/08-arboles-binarios.html' },
    { id:'09', color:'purple',  icon:'🔍', title:'BST – Árbol de Búsqueda',  tags:['Búsqueda','O(log n)'],           desc:'Árbol binario donde los valores menores van a la izquierda y mayores a la derecha.',href:'temas/09-bst.html' },
    { id:'10', color:'emerald', icon:'⚖️', title:'Árboles AVL',              tags:['Balanceo','Rotaciones'],         desc:'BST autobalanceado que garantiza O(log n) mediante rotaciones.',                href:'temas/10-avl.html' },
    { id:'11', color:'orange',  icon:'🗺️', title:'Grafos',                  tags:['Vértices','Aristas','BFS/DFS'],  desc:'Estructuras que modelan relaciones entre objetos mediante vértices y aristas.',  href:'temas/11-grafos.html' },
    { id:'12', color:'rose',    icon:'⏱️', title:'Complejidad Algorítmica',  tags:['Big O','Tiempo','Espacio'],      desc:'Análisis del crecimiento del tiempo y espacio de los algoritmos según el tamaño de entrada.', href:'temas/12-complejidad.html' },
  ];

  const grid = document.getElementById('grid');
  topics.forEach((t,i) => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = t.href;
    card.setAttribute('data-color', t.color);
    card.style.animationDelay = (i*0.06)+'s';
    card.innerHTML = `
      <div class="card-num">MÓDULO ${t.id}</div>
      <span class="card-icon">${t.icon}</span>
      <h3>${t.title}</h3>
      <p>${t.desc}</p>
      <div class="card-tags">${t.tags.map(tag=>`<span class="tag">${tag}</span>`).join('')}</div>
      <div class="card-arrow">↗</div>
    `;
    grid.appendChild(card);
  });

  const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('visible'); });
  },{threshold:0.1});
  document.querySelectorAll('.card').forEach(c=>obs.observe(c));

  document.querySelectorAll('a,.card').forEach(el=>{
    el.addEventListener('mouseenter',()=>cur.style.transform='translate(-50%,-50%) scale(2)');
    el.addEventListener('mouseleave',()=>cur.style.transform='translate(-50%,-50%) scale(1)');
  });
</script>
</body>
</html>
